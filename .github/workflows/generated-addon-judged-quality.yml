name: generated-addon-judged-quality

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Backend to evaluate
        required: false
        default: copilot
        type: choice
        options:
          - copilot
          - bedrock
          - kiro
          - local
  schedule:
    - cron: '0 11 * * 3'

jobs:
  evaluate-generated-addon-review-quality:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select backend
        id: backend
        shell: bash
        run: |
          backend="copilot"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.backend }}" ]; then
            backend="${{ inputs.backend }}"
          fi
          echo "backend=${backend}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Find latest history artifact
        id: prior-history
        uses: actions/github-script@v7
        env:
          BACKEND_NAME: ${{ steps.backend.outputs.backend }}
        with:
          script: |
            const artifactName = `generated-addon-judged-quality-history-${process.env.BACKEND_NAME}`;
            const response = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const artifact = response.data.artifacts
              .filter((candidate) => candidate.name === artifactName && !candidate.expired)
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at))[0];
            core.setOutput('found', artifact ? 'true' : 'false');
            core.setOutput('archive_url', artifact ? artifact.archive_download_url : '');

      - name: Restore previous history
        if: steps.prior-history.outputs.found == 'true'
        shell: bash
        run: |
          mkdir -p artifacts/generated-addon-review-quality/prior-history
          curl -L \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ steps.prior-history.outputs.archive_url }}" \
            -o artifacts/generated-addon-review-quality/prior-history.zip
          python -m zipfile -e artifacts/generated-addon-review-quality/prior-history.zip artifacts/generated-addon-review-quality/prior-history
          history_file="$(find artifacts/generated-addon-review-quality/prior-history -name history.json | head -n 1 || true)"
          if [ -n "$history_file" ]; then
            cp "$history_file" artifacts/generated-addon-review-quality/history.json
          fi

      - name: Run judged generated-addon quality evaluation
        shell: bash
        run: |
          mkdir -p artifacts/generated-addon-review-quality
          python tools/evaluate_generated_addon_review_quality.py \
            --backend "${{ steps.backend.outputs.backend }}" \
            --json-out artifacts/generated-addon-review-quality/summary.json \
            --markdown-summary-out artifacts/generated-addon-review-quality/summary.md \
            --history-file artifacts/generated-addon-review-quality/history.json

      - name: Publish judged-quality summary
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/generated-addon-review-quality/summary.md ]; then
            cat artifacts/generated-addon-review-quality/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload judged-quality history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-addon-judged-quality-history-${{ steps.backend.outputs.backend }}
          path: artifacts/generated-addon-review-quality
          if-no-files-found: warn