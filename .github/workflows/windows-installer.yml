name: Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install system prerequisites
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui]"

      - name: Prepare signing certificate
        if: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'windows-signing-cert.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String("${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}"))
          "WINDOWS_SIGN_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build installer
        shell: cmd
        env:
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
        run: build_installer.bat

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: |
            dist/installer/*.exe
            dist/installer/*.exe.sha256
            dist/AICodeReviewer.exe
            dist/AICodeReviewer.exe.sha256

      - name: Remove signing certificate
        if: ${{ always() }}
        shell: pwsh
        run: |
          if ($env:WINDOWS_SIGN_CERT_PATH -and (Test-Path -LiteralPath $env:WINDOWS_SIGN_CERT_PATH)) {
            Remove-Item -LiteralPath $env:WINDOWS_SIGN_CERT_PATH -Force
          }
