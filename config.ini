[backend]
type = local

[performance]
max_file_size_mb = 10
max_fix_file_size_mb = 5
file_cache_size = 100
min_request_interval_seconds = 6.0
max_requests_per_minute = 10
api_timeout_seconds = 300
connect_timeout_seconds = 30
max_content_length = 100000
max_fix_content_length = 50000

[processing]
batch_size = 5
enable_parallel_processing = false
enable_interaction_analysis = true
enable_architectural_review = false
combine_files = true

[logging]
log_level = INFO
enable_performance_logging = true
enable_file_logging = false
log_file = aicodereviewer.log
enable_api_audit_file_logging = true
api_audit_log_file = aicodereviewer-audit.log
api_audit_log_max_bytes = 1048576
api_audit_log_backup_count = 5

[model]
model_id = anthropic.claude-3-5-sonnet-20240620-v1:0

[aws]
access_key_id = 
region = us-east-1
session_token = 
sso_session = 
sso_account_id = 
sso_role_name = 
sso_region = us-east-1
sso_start_url = 
sso_registration_scopes = sso:account:access
output = json

[kiro]
wsl_distro = 
cli_command = kiro-cli
timeout = 300

[copilot]
copilot_path = copilot
timeout = 300
model = gpt-5-mini

[tool_file_access]
enabled = false
backend_allowlist = copilot
sensitive_path_globs = .env,.env.*,*.pem,*.key,*.p12,*.pfx,*.crt,id_rsa,id_dsa,credentials.*,secrets.*
sensitive_path_policy = deny

[local_llm]
api_url = http://localhost:1234
api_type = openai
model = default
api_key = 
timeout = 300
max_tokens = 4096
enable_web_search = true

[gui]
