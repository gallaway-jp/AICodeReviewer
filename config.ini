benchmark_artifacts_root = C:\Users\Colin\AppData\Local\Temp\pytest-of-Colin\pytest-922\test_benchmark_tab_selector_li0\artifacts
benchmark_fixture_filter_key = all
benchmark_fixture_sort_key = default
